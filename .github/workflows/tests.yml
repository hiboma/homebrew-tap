name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: brew audit
    runs-on: ubuntu-latest
    steps:
      - name: Set up Homebrew
        id: setup-homebrew
        uses: Homebrew/actions/setup-homebrew@f1cc9df7a62b7f6244414d21a3ebc3ba9156a082 # master 2026-04-28

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: source

      - name: Install tap into Homebrew
        run: |
          tap_dir="$(brew --repository)/Library/Taps/hiboma/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          rm -rf "$tap_dir"
          ln -s "$GITHUB_WORKSPACE/source" "$tap_dir"

      - name: Run brew audit
        run: brew audit --strict --online --tap=hiboma/tap
